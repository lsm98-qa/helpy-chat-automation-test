[pytest]
addopts = --html=artifacts/reports/report.html --self-contained-html
log_cli = true
log_cli_level = INFO
log_file = artifacts/logs/pytest.log
log_file_level = INFO
log_cli_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_file_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
